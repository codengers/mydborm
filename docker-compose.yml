version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mydborm_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 12

  yugabyte:
    image: yugabytedb/yugabyte:latest
    container_name: mydborm_yugabyte
    command: >
      bash -c "bin/yugabyted start --daemon=false"
    ports:
      - "5433:5433"
      - "7000:7000"
    healthcheck:
      test: ["CMD", "bin/ysqlsh", "-h", "localhost", "-c", "select 1"]
      interval: 10s
      timeout: 5s
      retries: 15