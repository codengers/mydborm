# =============================================================================
# File        : .github/workflows/ci.yml
# Project     : mydborm - Lightweight ORM for MySQL and YugabyteDB
# Author      : Atikrant Upadhye
# Created     : 2026-06-15
# Version     : 0.3.0
# License     : MIT
# Description : GitHub Actions CI pipeline. Runs full pytest suite against
#               a live MySQL 8 container on every push and pull request.
#               Auto-publishes to PyPI on git tag push (v*).
# =============================================================================

name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
    tags:     ["v*"]
  pull_request:
    branches: ["main", "develop"]

jobs:

  # ------------------------------------------------------------------ #
  #  Test                                                                #
  # ------------------------------------------------------------------ #

  test:
    name: "Python ${{ matrix.python-version }} — ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"
          pip install mysql-connector-python psycopg2-binary

      - name: Wait for MySQL
        run: |
          python -c "
          import time, mysql.connector
          for i in range(30):
              try:
                  mysql.connector.connect(
                      host='127.0.0.1', port=3307,
                      user='root', password='root', database='testdb'
                  )
                  print('MySQL ready.')
                  break
              except Exception as e:
                  print(f'Waiting... ({i+1}/30)')
                  time.sleep(2)
          "

      - name: Run tests
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3307/testdb
        run: |
          pytest tests/ -v --cov=mydborm --cov-report=term-missing

      - name: Upload coverage report
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ------------------------------------------------------------------ #
  #  Publish to PyPI (only on version tag push)                         #
  # ------------------------------------------------------------------ #

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/project/mydborm/

    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1